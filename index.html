<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Tema 10 — Prevención de Riesgos Laborales | Opositar en Valencia</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #d97706; --naranja-claro: #fef3c7; --naranja-borde: #f59e0b;
    --azul-oscuro: #1e293b; --texto: #374151; --texto-suave: #6b7280;
    --borde: #e5e7eb; --fondo: #fafaf9; --blanco: #ffffff;
    --verde: #166534; --verde-bg: #f0fdf4; --verde-borde: #86efac;
    --rojo: #991b1b; --rojo-bg: #fef2f2; --rojo-borde: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  header { background: var(--blanco); border-bottom: 1px solid var(--borde); }
  .header-top { max-width: 860px; margin: 0 auto; padding: 1.4rem 1.5rem 1rem; display: flex; align-items: flex-start; gap: 1.2rem; }
  .header-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: contain; flex-shrink: 0; }
  .header-textos { flex: 1; }
  .header-site { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--naranja); font-weight: 600; margin-bottom: 3px; }
  .header-titulo { font-family: 'Lora', serif; font-size: clamp(1.15rem, 3vw, 1.65rem); font-weight: 700; color: var(--azul-oscuro); line-height: 1.2; }
  .header-sub { font-size: 0.88rem; color: var(--texto-suave); margin-top: 4px; }
  .header-meta { background: var(--naranja-claro); border-top: 1px solid #fde68a; padding: 0.55rem 1.5rem; }
  .header-meta-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; font-size: 0.83rem; color: #92400e; font-weight: 500; }
  .barra-wrap { position: sticky; top: 0; z-index: 100; background: var(--blanco); border-bottom: 1px solid var(--borde); padding: 0.6rem 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .barra-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
  .barra-track { flex: 1; height: 6px; background: #f3f4f6; border-radius: 99px; overflow: hidden; }
  .barra-fill { height: 100%; background: var(--naranja); border-radius: 99px; transition: width 0.35s ease; width: 0%; }
  .barra-num { font-size: 13px; font-weight: 600; color: var(--azul-oscuro); white-space: nowrap; min-width: 52px; }
  .barra-score { font-size: 13px; color: var(--texto-suave); white-space: nowrap; }
  .barra-score .ok { color: var(--verde); font-weight: 600; }
  .barra-score .ko { color: var(--rojo); font-weight: 600; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
  .card { background: var(--blanco); border: 1px solid var(--borde); border-radius: 10px; padding: 1.5rem 1.6rem; margin-bottom: 1.4rem; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
  .card-num { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--naranja); margin-bottom: 0.5rem; }
  .card-pregunta { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; line-height: 1.55; color: var(--azul-oscuro); margin-bottom: 1.1rem; }
  .opciones { display: flex; flex-direction: column; gap: 0.45rem; }
  .opcion { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.7rem 1rem; border: 1.5px solid var(--borde); border-radius: 7px; cursor: pointer; background: var(--blanco); text-align: left; font-family: 'Source Sans 3', sans-serif; font-size: 0.93rem; color: var(--texto); line-height: 1.5; transition: border-color 0.15s, background 0.15s; width: 100%; }
  .opcion:hover:not(:disabled) { border-color: var(--naranja-borde); background: var(--naranja-claro); }
  .opcion .letra { font-weight: 700; color: var(--naranja); min-width: 18px; font-size: 0.85rem; margin-top: 2px; flex-shrink: 0; }
  .opcion.correcta { border-color: var(--verde-borde); background: var(--verde-bg); color: var(--verde); }
  .opcion.correcta .letra { color: #15803d; }
  .opcion.incorrecta { border-color: var(--rojo-borde); background: var(--rojo-bg); color: var(--rojo); }
  .opcion.incorrecta .letra { color: var(--rojo); }
  .opcion:disabled { cursor: default; }
  .explicacion { display: none; margin-top: 1rem; padding: 0.9rem 1rem 0.9rem 1.1rem; background: #fffbeb; border-left: 3px solid var(--naranja); border-radius: 0 6px 6px 0; font-size: 0.875rem; line-height: 1.65; color: var(--texto); }
  .explicacion.visible { display: block; animation: fadeIn 0.22s ease; }
  .explicacion strong { color: var(--azul-oscuro); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
  .resultado { display: none; background: var(--blanco); border: 1px solid var(--borde); border-radius: 12px; padding: 2.5rem 2rem 2rem; margin: 1.5rem 0 2rem; text-align: center; }
  .resultado.visible { display: block; animation: fadeIn 0.3s ease; }
  .resultado-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--naranja); font-weight: 600; margin-bottom: 0.5rem; }
  .resultado h2 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 700; color: var(--azul-oscuro); margin-bottom: 0.3rem; }
  .resultado-nota { font-size: 3.2rem; font-weight: 700; color: var(--azul-oscuro); line-height: 1; margin: 1rem 0 0.3rem; font-family: 'Lora', serif; }
  .resultado-nota span { color: var(--naranja); }
  .calif-badge { display: inline-block; padding: 5px 16px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; margin: 0.6rem 0 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 0 0 1.5rem; }
  .stat { background: var(--fondo); border: 1px solid var(--borde); border-radius: 8px; padding: 0.9rem 0.5rem; }
  .stat-num { font-size: 1.9rem; font-weight: 700; font-family: 'Lora', serif; }
  .stat-lab { font-size: 0.78rem; color: var(--texto-suave); margin-top: 2px; }
  .resultado-hint { font-size: 0.85rem; color: var(--texto-suave); margin-bottom: 1.2rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.7rem 1.6rem; border-radius: 7px; font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
  .btn-naranja { background: var(--naranja); color: white; }
  .btn-naranja:hover { background: #b45309; transform: translateY(-1px); }
  @media (max-width: 580px) { main { padding: 1.2rem 1rem 4rem; } .card { padding: 1.1rem; } .stats { grid-template-columns: 1fr 1fr; } .header-top { padding: 1rem; gap: 0.8rem; } .header-meta { padding: 0.5rem 1rem; } }
</style>

    <div class="header-textos">

    </div>

<div class="barra-wrap">
  <div class="barra-inner">
    <div class="barra-track"><div class="barra-fill" id="barraFill"></div></div>

  </div>
</div>

<main id="mainContent"></main>

<script>
const BANCO = [

  /* ══ CAPÍTULO I — OBJETO, ÁMBITO Y DEFINICIONES ══ */
  {
    p: "¿Cuál es el objeto de la Ley 31/1995 de Prevención de Riesgos Laborales según su artículo 2.1?",
    ops: [
      "Regular el régimen sancionador aplicable a los empresarios incumplidores en materia de seguridad laboral",
      "Promover la seguridad y la salud de los trabajadores mediante la aplicación de medidas y el desarrollo de las actividades necesarias para la prevención de riesgos derivados del trabajo",
      "Establecer un sistema único de Mutuas de Accidentes de Trabajo y Enfermedades Profesionales",
      "Crear el Instituto Nacional de Seguridad y Salud en el Trabajo como organismo regulador"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 2.1 LPRL establece que la Ley «tiene por objeto promover la seguridad y la salud de los trabajadores mediante la aplicación de medidas y el desarrollo de las actividades necesarias para la prevención de riesgos derivados del trabajo». A tal efecto, establece principios generales sobre protección, eliminación de riesgos, información, consulta, participación y formación."
  },
  {
    p: "Según el artículo 2.2 de la LPRL, ¿qué carácter tienen las disposiciones laborales de esta Ley y sus normas reglamentarias?",
    ops: [
      "Carácter de Derecho dispositivo, modificable libremente por acuerdo entre las partes",
      "Carácter de Derecho necesario mínimo indisponible, pudiendo ser mejoradas y desarrolladas en los convenios colectivos",
      "Carácter de Derecho supletorio, aplicable solo en defecto de convenio colectivo",
      "Carácter de Derecho necesario absoluto, no modificable ni siquiera por convenio colectivo"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 2.2 LPRL establece que las disposiciones laborales de la Ley «tendrán en todo caso el carácter de Derecho necesario mínimo indisponible, pudiendo ser mejoradas y desarrolladas en los convenios colectivos». Es decir, fijan un suelo de protección que no puede rebajarse, pero sí mejorarse mediante negociación colectiva."
  },
  {
    p: "El artículo 3.1 de la LPRL establece el ámbito de aplicación de la Ley. ¿A qué tipos de relaciones se aplica?",
    ops: [
      "Exclusivamente a las relaciones laborales reguladas en el Estatuto de los Trabajadores",
      "A las relaciones laborales del Estatuto de los Trabajadores y a las relaciones de carácter administrativo o estatutario del personal al servicio de las Administraciones Públicas, con las peculiaridades que se contemplen",
      "Solo a las relaciones laborales del sector privado, quedando excluido el empleo público",
      "Únicamente a las relaciones estatutarias del personal sanitario y a las laborales del sector privado"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 3.1 LPRL establece que la Ley «será de aplicación tanto en el ámbito de las relaciones laborales reguladas en el texto refundido de la Ley del Estatuto de los Trabajadores, como en el de las relaciones de carácter administrativo o estatutario del personal al servicio de las Administraciones Públicas, con las peculiaridades que, en este caso, se contemplan en la presente Ley»."
  },
  {
    p: "¿Es de aplicación la LPRL a las sociedades cooperativas, según el artículo 3.1?",
    ops: [
      "No, las cooperativas quedan excluidas por su régimen jurídico especial",
      "Sí, en las que existan socios cuya actividad consista en la prestación de un trabajo personal, con las peculiaridades de su normativa específica",
      "Sí, pero solo respecto a sus trabajadores asalariados, nunca respecto a los socios trabajadores",
      "Solo es aplicable a las cooperativas de trabajo asociado de más de 50 socios"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 3.1 LPRL extiende su aplicación «a las sociedades cooperativas, constituidas de acuerdo con la legislación que les sea de aplicación, en las que existan socios cuya actividad consista en la prestación de un trabajo personal, con las peculiaridades derivadas de su normativa específica»."
  },
  {
    p: "El artículo 3.2 de la LPRL excluye determinadas actividades de funciones públicas. ¿Cuál de las siguientes SÍ está excluida del ámbito de aplicación de la Ley?",
    ops: [
      "Los servicios sanitarios públicos en general",
      "Policía, seguridad y resguardo aduanero",
      "El personal docente de centros públicos de enseñanza",
      "El personal administrativo de las Administraciones Públicas"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 3.2 LPRL excluye, cuando las particularidades de la actividad lo impidan: policía, seguridad y resguardo aduanero; servicios operativos de protección civil y peritaje forense en casos de grave riesgo, catástrofe y calamidad pública; y Fuerzas Armadas y actividades militares de la Guardia Civil. No obstante, la Ley «inspirará la normativa específica» que se dicte para estas actividades."
  },
  {
    p: "¿Qué tres ámbitos de funciones públicas excluye expresamente el artículo 3.2 de la LPRL?",
    ops: [
      "Policía y seguridad; servicios operativos de protección civil y peritaje forense en grave riesgo, catástrofe y calamidad pública; Fuerzas Armadas y actividades militares de la Guardia Civil",
      "Policía y seguridad; instituciones penitenciarias; servicios de inteligencia del Estado",
      "Fuerzas Armadas; servicios diplomáticos; Cuerpo Nacional de Policía",
      "Resguardo aduanero; servicios de emergencia sanitaria; bomberos forestales"
    ],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 3.2 LPRL enumera exactamente tres ámbitos excluidos: «Policía, seguridad y resguardo aduanero»; «Servicios operativos de protección civil y peritaje forense en los casos de grave riesgo, catástrofe y calamidad pública»; y «Fuerzas Armadas y actividades militares de la Guardia Civil». Estas exclusiones operan solo «en aquellas actividades cuyas particularidades lo impidan»."
  },
  {
    p: "Según el artículo 3.3 de la LPRL, ¿es aplicable la Ley a los centros y establecimientos militares?",
    ops: [
      "No, los centros militares quedan totalmente excluidos del ámbito de la Ley",
      "Sí, con las particularidades previstas en su normativa específica",
      "Sí, pero solo respecto al personal civil que preste servicios en dichos centros",
      "Solo es aplicable previa autorización del Ministerio de Defensa caso por caso"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 3.3 LPRL establece que «en los centros y establecimientos militares será de aplicación lo dispuesto en la presente Ley, con las particularidades previstas en su normativa específica». A diferencia de las actividades militares strictu sensu del art. 3.2, los centros y establecimientos militares sí quedan dentro del ámbito de la Ley, con adaptaciones."
  },
  {
    p: "¿Cómo se adapta la LPRL a los establecimientos penitenciarios, según el artículo 3.3?",
    ops: [
      "Quedan totalmente excluidos de la aplicación de la Ley por su régimen especial",
      "Se adaptarán aquellas actividades cuyas características justifiquen una regulación especial, conforme a la Ley 7/1990 sobre negociación colectiva de empleados públicos",
      "Se les aplica directamente sin ninguna adaptación ni particularidad",
      "Solo se aplica al personal funcionario, no al personal laboral de prisiones"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 3.3 LPRL establece que «en los establecimientos penitenciarios, se adaptarán a la presente Ley aquellas actividades cuyas características justifiquen una regulación especial, lo que se llevará a efecto en los términos señalados en la Ley 7/1990, de 19 de julio, sobre negociación colectiva y participación en la determinación de las condiciones de trabajo de los empleados públicos»."
  },
  {
    p: "El artículo 4.1º de la LPRL define el término «prevención». ¿Cuál es esa definición?",
    ops: [
      "El conjunto de actividades o medidas adoptadas o previstas en todas las fases de actividad de la empresa con el fin de evitar o disminuir los riesgos derivados del trabajo",
      "La eliminación absoluta de todos los riesgos existentes en el centro de trabajo",
      "El conjunto de sanciones aplicables a los empresarios incumplidores de la normativa preventiva",
      "Las medidas de primeros auxilios y asistencia médica de urgencia en el entorno laboral"
    ],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 4.1º LPRL define «prevención» como «el conjunto de actividades o medidas adoptadas o previstas en todas las fases de actividad de la empresa con el fin de evitar o disminuir los riesgos derivados del trabajo». Es una definición amplia: abarca toda la vida de la empresa, no solo el momento de producirse el riesgo."
  },
  {
    p: "Según el artículo 4.2º de la LPRL, ¿qué factores se valoran conjuntamente para calificar un riesgo laboral desde el punto de vista de su gravedad?",
    ops: [
      "La frecuencia con que se repite la actividad y el número de trabajadores expuestos",
      "La probabilidad de que se produzca el daño y la severidad del mismo",
      "El coste económico del daño y la duración de la incapacidad laboral resultante",
      "La antigüedad del trabajador en el puesto y su nivel de formación específica"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 4.2º LPRL define «riesgo laboral» como «la posibilidad de que un trabajador sufra un determinado daño derivado del trabajo» y añade que, «para calificar un riesgo desde el punto de vista de su gravedad, se valorarán conjuntamente la probabilidad de que se produzca el daño y la severidad del mismo». Es la fórmula clásica de evaluación de riesgos: probabilidad × severidad."
  },
  {
    p: "¿Cómo define el artículo 4.3º de la LPRL los «daños derivados del trabajo»?",
    ops: [
      "Exclusivamente los accidentes de trabajo que produzcan incapacidad temporal o permanente",
      "Las enfermedades, patologías o lesiones sufridas con motivo u ocasión del trabajo",
      "Los daños materiales causados a equipos e instalaciones de la empresa por negligencia del trabajador",
      "Las pérdidas económicas sufridas por el empresario a consecuencia de un accidente laboral"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 4.3º LPRL define «daños derivados del trabajo» como «las enfermedades, patologías o lesiones sufridas con motivo u ocasión del trabajo». La definición es amplia: incluye tanto enfermedades como patologías y lesiones, sin distinguir su origen (accidente súbito o exposición prolongada)."
  },
  {
    p: "El artículo 4.4º de la LPRL define el «riesgo laboral grave e inminente». ¿Qué elemento temporal exige dicha definición?",
    ops: [
      "Que el riesgo ya se haya materializado parcialmente en el pasado reciente",
      "Que resulte probable racionalmente que se materialice en un futuro inmediato y pueda suponer un daño grave para la salud",
      "Que el riesgo se repita de forma cíclica cada determinado período de tiempo",
      "Que el riesgo afecte simultáneamente a más de cinco trabajadores del centro"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 4.4º LPRL define el riesgo grave e inminente como «aquel que resulte probable racionalmente que se materialice en un futuro inmediato y pueda suponer un daño grave para la salud de los trabajadores». La probabilidad racional y la inmediatez temporal son los dos elementos definitorios."
  },
  {
    p: "El artículo 4.4º de la LPRL contempla un supuesto específico de riesgo grave e inminente en caso de exposición a agentes peligrosos. ¿Cuál es la particularidad de este supuesto?",
    ops: [
      "Se considera riesgo grave e inminente aunque los daños no se manifiesten de forma inmediata, si es probable racionalmente que se materialice en un futuro inmediato una exposición de la que puedan derivarse daños graves",
      "Solo se considera grave e inminente si el daño se manifiesta dentro de las 24 horas siguientes a la exposición",
      "Se excluye de la calificación de grave e inminente cualquier exposición cuyos efectos sean acumulativos a largo plazo",
      "Requiere que al menos tres trabajadores hayan sido diagnosticados previamente con patologías similares"
    ],
    c: 0,
    exp: "<strong>Respuesta correcta: A.</strong> El art. 4.4º LPRL establece que, en exposición a agentes susceptibles de causar daños graves, existe riesgo grave e inminente cuando sea probable racionalmente que se materialice en un futuro inmediato una exposición de la que puedan derivarse daños graves, «aun cuando éstos no se manifiesten de forma inmediata». Esto cubre exposiciones a sustancias cuyos efectos son acumulativos o de aparición diferida (p.ej. cancerígenos)."
  },
  {
    p: "¿Cómo define el artículo 4.5º de la LPRL los procesos, actividades, operaciones, equipos o productos «potencialmente peligrosos»?",
    ops: [
      "Aquellos que han causado al menos un accidente de trabajo grave en el último año",
      "Aquellos que, en ausencia de medidas preventivas específicas, originen riesgos para la seguridad y la salud de los trabajadores que los desarrollan o utilizan",
      "Aquellos sometidos a autorización administrativa previa por la autoridad laboral competente",
      "Aquellos clasificados como tales en el Reglamento de los Servicios de Prevención"
    ],
    c: 1,
    exp: "<strong>Respuesta correcta: B.</strong> El art. 4.5º LPRL define como «potencialmente peligrosos» aquellos procesos, actividades, operaciones, equipos o productos «que, en ausencia de medidas preventivas específicas, originen riesgos para la seguridad y la salud de los trabajadores que los desarrollan o utilizan». La clave está en el condicional: el peligro se manifiesta «en ausencia» de medidas preventivas."
  },
  {
    p: "El artículo 4.7º de la LPRL define «condición de trabajo» e incluye específicamente cuatro elementos. ¿Cuál de los siguientes NO figura entre ellos?",
    ops: [
      "Las características generales de los locales, instalaciones, equipos, productos y demás útiles del centro de trabajo",
      "La naturaleza de los agentes físicos, químicos y biológicos presentes y sus intensidades, concentraciones o niveles",
      "Los procedimientos para la utilización de dichos agentes que influyan en la generación de riesgos",
      "El salario percibido por el trabajador y su régimen de jornada laboral"
    ],
    c: 3,
    exp: "<strong>Respuesta correcta: D.</strong> El art. 4.7º LPRL incluye específicamente: a) características de locales, instalaciones, equipos y útiles; b) naturaleza de agentes físicos, químicos y biológicos; c) procedimientos de utilización de dichos agentes; d) otras características del trabajo, incluida su organización y ordenación, que influyan en la magnitud de los riesgos. El salario y la jornada no son condiciones de trabajo a efectos de esta Ley, sino aspectos contractuales generales."
  },

document.getElementById('barraNum').textContent = '0 / ' + TOTAL;

function mezclar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function actualizarBarra() {
  document.getElementById('barraFill').style.width = ((respondidas / TOTAL) * 100) + '%';
  document.getElementById('barraNum').textContent = respondidas + ' / ' + TOTAL;
  document.getElementById('scoreOk').textContent = '✓ ' + aciertos;
  document.getElementById('scoreKo').textContent = '✗ ' + errores;
}

    card.className = 'card';
    card.id = 'card-' + pos;

    const numDiv = document.createElement('div');
    numDiv.className = 'card-num';
    numDiv.textContent = 'Pregunta ' + (pos + 1);

    const pregDiv = document.createElement('div');
    pregDiv.className = 'card-pregunta';
    pregDiv.textContent = q.p;

    const opcionesDiv = document.createElement('div');
    opcionesDiv.className = 'opciones';

    opsOrden.forEach((opIdx, i) => {
      const btn = document.createElement('button');
      btn.className = 'opcion';
      btn.dataset.correcto = (opIdx === q.c) ? '1' : '0';
      btn.dataset.pos = pos;
      btn.innerHTML = '<span class="letra">' + letras[i] + '</span><span>' + q.ops[opIdx] + '</span>';
      btn.addEventListener('click', onOpcionClick);
      opcionesDiv.appendChild(btn);
    });

    const expDiv = document.createElement('div');
    expDiv.className = 'explicacion';
    expDiv.id = 'exp-' + pos;
    expDiv.innerHTML = q.exp;

    card.appendChild(numDiv);
    card.appendChild(pregDiv);
    card.appendChild(opcionesDiv);
    card.appendChild(expDiv);
    main.appendChild(card);
  });

  const res = document.createElement('div');
  res.className = 'resultado';
  res.id = 'resultado';
  res.innerHTML = `
    <div class="resultado-eyebrow">Resultado final</div>
    <h2>Test completado</h2>
    <div class="resultado-nota"><span id="rNota">-</span><span style="font-size:1.5rem;color:var(--texto-suave)">/10</span></div>
    <div id="rBadge" class="calif-badge"></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="rOk" style="color:var(--verde)">-</div><div class="stat-lab">Correctas</div></div>
      <div class="stat"><div class="stat-num" id="rKo" style="color:var(--rojo)">-</div><div class="stat-lab">Erróneas</div></div>
      <div class="stat"><div class="stat-num" id="rPct">-</div><div class="stat-lab">% Acierto</div></div>
    </div>
    <p class="resultado-hint">Revisa las explicaciones en cada pregunta para reforzar los conceptos.</p>
    <button class="btn btn-naranja" onclick="reiniciar()">🔄 Nuevo intento</button>
  `;
  main.appendChild(res);
}

function onOpcionClick(e) {
  const btn = e.currentTarget;
  const pos = parseInt(btn.dataset.pos);
  const card = document.getElementById('card-' + pos);
  card.querySelectorAll('.opcion').forEach(b => {
    b.disabled = true;
    if (b.dataset.correcto === '1') b.classList.add('correcta');
    else if (b === btn) b.classList.add('incorrecta');
  });
  document.getElementById('exp-' + pos).classList.add('visible');
  if (btn.dataset.correcto === '1') aciertos++; else errores++;
  respondidas++;
  actualizarBarra();
  if (respondidas === TOTAL) mostrarResultado();
}

function mostrarResultado() {
  const nota = ((aciertos / TOTAL) * 10).toFixed(1);
  const pct = Math.round((aciertos / TOTAL) * 100);
  let badge = '', color = '';
  if (pct >= 90)      { badge = '🏆 Sobresaliente'; color = '#166534'; }
  else if (pct >= 70) { badge = '✅ Notable';        color = '#1d4ed8'; }
  else if (pct >= 50) { badge = '⚠️ Aprobado';      color = '#92400e'; }
  else                { badge = '❌ Suspenso';       color = '#991b1b'; }
  document.getElementById('rNota').textContent = nota;
  document.getElementById('rOk').textContent = aciertos;
  document.getElementById('rKo').textContent = errores;
  document.getElementById('rPct').textContent = pct + '%';
  const badgeEl = document.getElementById('rBadge');
  badgeEl.textContent = badge;
  badgeEl.style.cssText += `;background:${color}22;color:${color};border:1px solid ${color}44`;
  const res = document.getElementById('resultado');
  res.classList.add('visible');
  setTimeout(() => res.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function reiniciar() {
  respondidas = 0; aciertos = 0; errores = 0;
  actualizarBarra();
  construirPreguntas();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

construirPreguntas();
</script>
</body>
</html>
